services:
  api:
    build: .
    container_name: tutorku-api
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads

  postgres:
    image: postgres:16
    container_name: tutorku-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: tutorku_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      TZ: Asia/Jakarta
      PGTZ: Asia/Jakarta
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d tutorku_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pgdata:
  uploads_data:
